name: Deploy docs

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [code-updated]   # fired by mandalanil/pywmp on code changes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Overlay docs from mandalanil/pywmp
        env:
          PYWMP_TOKEN: ${{ secrets.PYWMP_READ_TOKEN }}
          PYWMP_REF: ${{ github.event.client_payload.pywmp_ref || 'main' }}
        run: |
          if [ -n "$PYWMP_TOKEN" ]; then
            git clone --depth 1 --branch "$PYWMP_REF" \
              "https://${PYWMP_TOKEN}@github.com/mandalanil/pywmp.git" \
              pywmp-source
            rsync -av --delete pywmp-source/docs/ docs/
            cp pywmp-source/mkdocs.yml mkdocs.yml
            rsync -av pywmp-source/overrides/ overrides/ 2>/dev/null || true
            rm -rf pywmp-source
            echo "Docs synced from mandalanil/pywmp@${PYWMP_REF}"
          else
            echo "PYWMP_READ_TOKEN not set — building from local docs copy"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install docs dependencies
        run: pip install -r requirements.txt

      - name: Install pywmp (needed for mkdocstrings)
        # mandalanil/pywmp is private — skipped until PYWMP_READ_TOKEN secret is added
        # To activate: create a PAT with read access to mandalanil/pywmp, store as PYWMP_READ_TOKEN in pywmp_documentation secrets
        env:
          PYWMP_TOKEN: ${{ secrets.PYWMP_READ_TOKEN }}
        run: |
          if [ -n "$PYWMP_TOKEN" ]; then
            pip install "git+https://${PYWMP_TOKEN}@github.com/mandalanil/pywmp.git"
          else
            echo "PYWMP_READ_TOKEN not set — skipping pywmp install (add secret to enable mkdocstrings auto-docs)"
          fi

      - name: Build site
        run: mkdocs build --site-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
