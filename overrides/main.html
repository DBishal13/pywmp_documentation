{% extends "base.html" %}

{% block site_nav %}
  {% if nav %}
    <div class="md-sidebar md-sidebar--primary" data-md-component="sidebar" data-md-type="navigation">
      <div class="md-sidebar__scrollwrap">
        <div class="md-sidebar__inner">

          <!-- Compact brand strip -->
          <div class="sb-brand">
            <a href="{{ 'index.html' | url }}" class="sb-brand__link">
              <div class="sb-brand__mark">
                <img src="{{ 'images/PyWMP_Logo_Design_SVG.svg' | url }}" alt="PyWMP">
              </div>
              <div class="sb-brand__text">
                <span class="sb-brand__name">PyWMP</span>
                <span class="sb-brand__sub">Watershed Modelling & Planning</span>
              </div>
              <span class="sb-brand__ver">v0.2.0</span>
            </a>
            <p class="sb-brand__copy">© PyWMP · CWR3 · FAU</p>
          </div>

          {% include "partials/nav.html" %}
        </div>
      </div>
    </div>
  {% endif %}
{% endblock %}
